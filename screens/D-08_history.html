<title>ProGrow — D-08 測定履歴</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0B1D35;--blue:#1E6FD9;--sky:#5DADE2;--mint:#06C755;
  --pale:#EBF3FF;--text:#0F2137;--sub:#5A6F84;--muted:#8FA3B8;
  --border:#D8E5EF;--bg:#F4F8FC;--white:#fff;
  --ok:#27AE60;--warn:#E8A030;--danger:#E53E3E;
  --ok-bg:#EAFAF1;--warn-bg:#FFF7E6;--danger-bg:#FFF5F5;
  --line:#06C755;--purple:#6C3483;
  --font:'Plus Jakarta Sans','Noto Sans JP',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r:14px;
}
html,body{height:100%;font-family:var(--font);background:#1A2840;display:flex;align-items:center;justify-content:center;overflow:hidden}
.phone{width:390px;height:844px;background:var(--white);border-radius:44px;box-shadow:0 0 0 10px #141F30,0 0 0 12px #0D1520,0 32px 80px rgba(0,0,0,.7);overflow:hidden;display:flex;flex-direction:column;position:relative}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:34px;background:#141F30;border-radius:0 0 22px 22px;z-index:20}
.sb{height:34px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;padding-top:6px;font-size:10px;color:rgba(255,255,255,.6);font-family:var(--mono);flex-shrink:0}
.sb-light{background:var(--navy)}
.screen{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}

.hdr{background:linear-gradient(160deg,var(--navy) 0%,#1A4F8A 100%);padding:16px 20px 18px;position:relative;overflow:hidden;flex-shrink:0}
.hdr::after{content:'';position:absolute;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.04);bottom:-90px;right:-60px;pointer-events:none;z-index:0}
.hdr-top, .range-tab-row{position:relative;z-index:1}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.back{display:flex;align-items:center;gap:10px}
.back-btn{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:16px;color:white;cursor:pointer;border:1px solid rgba(255,255,255,.15)}
.hdr-title{font-size:16px;font-weight:700;color:white;letter-spacing:-.01em}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:2px}

.range-tab-row{display:grid;grid-template-columns:repeat(7,1fr);background:rgba(255,255,255,.1);border-radius:10px;padding:3px;gap:2px;margin-top:8px}
.range-tab{text-align:center;padding:7px 2px;border-radius:8px;font-size:10px;font-weight:600;color:rgba(255,255,255,.55);cursor:pointer;transition:all .15s;white-space:nowrap;min-width:0;user-select:none}
.range-tab:active{background:rgba(255,255,255,.15)}
.range-tab.act{background:white;color:var(--blue);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.1)}

.scroll-flat{flex:1;overflow-y:auto;padding:16px;background:var(--bg)}
.scroll-flat::-webkit-scrollbar{display:none}

.card{background:var(--white);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(11,29,53,.07);border:1px solid rgba(216,229,239,.5)}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.card-title{font-size:13px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:6px}

.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap}
.b-ok{background:var(--ok-bg);color:var(--ok);border:1px solid rgba(39,174,96,.2)}
.b-warn{background:var(--warn-bg);color:var(--warn);border:1px solid rgba(232,160,48,.2)}
.b-bad{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(229,62,62,.2)}
.b-mu{background:#F2F4F6;color:var(--sub);border:1px solid var(--border)}

.bnav{background:white;border-top:1px solid var(--border);display:flex;padding:9px 0 22px;flex-shrink:0;box-shadow:0 -4px 16px rgba(11,29,53,.05)}
.nv{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:3px 0;transition:opacity .15s}
.nv-ico{font-size:20px;opacity:.3}
.nv-lbl{font-size:9px;color:var(--sub);font-weight:500}
.nv.act .nv-ico{opacity:1}
.nv.act .nv-lbl{color:var(--blue);font-weight:700}
.nv-dot{width:4px;height:4px;border-radius:50%;background:var(--blue);margin:0 auto}

/* 入力サマリーカード */
.summary-row{display:flex;gap:9px;margin-bottom:14px}
.summary-box{flex:1;background:#FAFCFE;border:1px solid var(--border);border-radius:11px;padding:9px;text-align:center}
.sb-lbl{font-size:9px;color:var(--sub);margin-bottom:2px}
.sb-val{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--navy);line-height:1}
.sb-sub{font-size:9px;color:var(--sub);margin-top:3px}

/* 履歴アイテム */
.hist-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid #F0F4F8;cursor:pointer;transition:background .12s}
.hist-item:hover{background:#FAFCFE}
.hist-item:last-child{border:none}
.hist-date{text-align:center;width:46px;flex-shrink:0}
.hist-month{font-size:10px;color:var(--sub);font-weight:600}
.hist-day{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--navy);line-height:1}
.hist-wd{font-size:9px;color:var(--muted);margin-top:1px}
.hist-vals{flex:1;min-width:0}
.hist-ht{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--navy)}
.hist-sub{font-size:10px;color:var(--sub);margin-top:2px;line-height:1.4}

.hist-skipped{opacity:.45;background:#F8FAFC}
.hist-skip-msg{font-size:11px;color:var(--muted);font-style:italic}

.edit-btn{
  padding:4px 10px;border-radius:7px;border:1.5px solid var(--blue);
  background:var(--pale);color:var(--blue);font-size:10px;font-weight:700;
  cursor:pointer;font-family:var(--font);
}

/* チャート */
.ch{position:relative;height:160px}

#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--navy);color:white;font-size:12px;font-weight:600;padding:11px 20px;border-radius:99px;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;box-shadow:0 8px 24px rgba(11,29,53,.25);pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* もっと見る */
.more-btn{
  width:100%;padding:10px;background:transparent;border:1px dashed var(--border);
  border-radius:10px;color:var(--blue);font-size:11px;font-weight:600;cursor:pointer;
  margin-top:8px;font-family:var(--font);
}
.more-btn:hover{background:var(--pale);border-color:var(--blue);border-style:solid}

/* 入力率ミニサマリー */
.streak-card{
  background:linear-gradient(135deg,#EBF3FF,#E8FAF0);
  border:1.5px solid rgba(30,111,217,.2);
  border-radius:var(--r);padding:13px;margin-bottom:12px;
  display:flex;align-items:center;gap:13px;
}
.streak-ico{
  width:46px;height:46px;border-radius:12px;
  background:linear-gradient(135deg,#1E6FD9,#06C755);color:white;
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
}
.streak-body{flex:1;min-width:0}
.streak-ttl{font-size:11px;color:var(--sub);font-weight:600;margin-bottom:2px}
.streak-val{font-family:var(--mono);font-size:20px;font-weight:800;color:var(--navy);line-height:1}
.streak-sub{font-size:10px;color:var(--sub);margin-top:3px}

@media (max-width: 480px), (max-height: 900px) {
  html, body { height:100%; background:var(--bg) !important; display:block !important; overflow:hidden; }
  .phone { width:100% !important; height:100% !important; border-radius:0 !important; box-shadow:none !important; max-width:none !important; }
  .notch { display:none !important; }
  .sb { display:none !important; }
  .bnav { padding-bottom: calc(9px + env(safe-area-inset-bottom)) !important; }
}
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="screen">
    <div class="sb sb-light"><span>9:41</span><span>● ● 100%</span></div>
    <div class="hdr">
      <div class="hdr-top" style="margin-top:6px">
        <div class="back">
          <div class="back-btn" onclick="location.href='D-01_dashboard.html'">‹</div>

          <div class="streak-sub"><span id="streak-done">27</span>日入力 / <span id="streak-total">30</span>日中 ・ 連続入力 <span id="streak-streak">4</span>日</div>

      <div class="nv" onclick="location.href='D-04_input_step1.html'"><div class="nv-ico">✏️</div><div class="nv-lbl">入力</div></div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════
// ヘルパー
// ══════════════════════════════════════════════════
function _today(){ var d = new Date(); d.setHours(0,0,0,0); return d; }
function _fmtDate(d){ return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function _parseDate(s){ var p = s.split('-').map(Number); return new Date(p[0], p[1]-1, p[2]); }
var WD = ['日','月','火','水','木','金','土'];

// 日付ごとに決定論的に値を生成（小学生〜中学生のリアルな成長カーブ）
// 想定: 今日 = 中2 (162.4cm/52.8kg)、5年前 = 小4 (133cm/30kg)
// 年齢ごとの平均身長/体重 (男子)
//   小4(9歳)  133.5cm / 30.5kg
//   小5(10歳) 138.9cm / 34.4kg
//   小6(11歳) 145.2cm / 38.4kg
//   中1(12歳) 152.7cm / 44.0kg
//   中2(13歳) 160.0cm / 49.0kg
//   中3(14歳) 165.3cm / 53.5kg
//   ※今日は中2半ば(2.5年経過時点)で 162.4cm/52.8kg を目標
function _interp(daysAgo, points){
  // points: [{day:0, val:162.4}, {day:365, val:155}, ...] 古い順
  for(var i = 0; i < points.length - 1; i++){
    var a = points[i], b = points[i+1];
    if(daysAgo >= a.day && daysAgo <= b.day){
      var t = (daysAgo - a.day) / (b.day - a.day);
      return a.val + (b.val - a.val) * t;
    }
  }
  // 範囲外は最後の値
  return points[points.length - 1].val;
}
// 今日から遡って何日目に身長/体重がどれくらいだったか
var _HT_POINTS = [
  { day: 0,    val: 162.4 },  // 今日 中2
  { day: 180,  val: 160.5 },
  { day: 365,  val: 156.5 },  // 1年前 中1
  { day: 730,  val: 148.0 },  // 2年前 小6
  { day: 1095, val: 141.0 },  // 3年前 小5
  { day: 1460, val: 135.5 },  // 4年前 小4
  { day: 1825, val: 130.0 },  // 5年前 小3
  { day: 2920, val: 120.0 }   // 8年前 (念のため)
];
var _WT_POINTS = [
  { day: 0,    val: 52.8 },
  { day: 180,  val: 51.5 },
  { day: 365,  val: 48.5 },
  { day: 730,  val: 41.0 },
  { day: 1095, val: 35.5 },
  { day: 1460, val: 32.0 },
  { day: 1825, val: 28.5 },
  { day: 2920, val: 24.0 }
];

function _genMetrics(dateStr, today){
  var d = _parseDate(dateStr);
  var daysAgo = Math.round((today - d) / (1000*60*60*24));
  var baseHt = _interp(daysAgo, _HT_POINTS);
  var baseWt = _interp(daysAgo, _WT_POINTS);
  // 微小ランダム（決定論的に日付からハッシュ）
  var h = (d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate()) % 997;
  var jitterHt = ((h % 11) - 5) * 0.02; // ±0.1cm
  var jitterWt = ((h % 13) - 6) * 0.05; // ±0.3kg
  var ht = (baseHt + jitterHt).toFixed(1);
  var wt = (baseWt + jitterWt).toFixed(1);
  // 睡眠 6.5〜9.0h
  var slp = (6.5 + (h % 26) * 0.1).toFixed(1);
  // タンパク質達成度（評価バッジ用）
  var rating = (h % 10);
  var grade;
  if(rating >= 7) grade = 'ok';
  else if(rating >= 3) grade = 'warn';
  else grade = 'bad';
  return { ht: ht, wt: wt, slp: slp, grade: grade };
}

// ══════════════════════════════════════════════════
// 状態
// ══════════════════════════════════════════════════
var _range = 30;
var _shown = 15;   // 一度に何件表示するか
var _cached = [];  // 現range下の全エントリ

// ══════════════════════════════════════════════════
// 履歴データ取得（localStorage一切非依存）
// ══════════════════════════════════════════════════
// 未入力日を決定論的に判定: 月3日くらいランダムにスキップ
function isSkipDay(d){
  // 月ごとに固定の3日を未入力扱い（年月でハッシュ）
  var year = d.getFullYear();
  var month = d.getMonth();
  var seed = year * 100 + month;
  var days = [];
  for(var i = 0; i < 3; i++){
    seed = (seed * 9301 + 49297) % 233280;
    var day = Math.floor((seed / 233280) * 28) + 1;
    if(days.indexOf(day) === -1) days.push(day);
  }
  return days.indexOf(d.getDate()) !== -1;
}

// range日分の日付配列を新しい順に生成（localStorage非依存）
function buildDays(range){
  var today = _today();
  var days = [];
  for(var i = 1; i <= range; i++){
    var d = new Date(today.getFullYear(), today.getMonth(), today.getDate() - i);
    var ds = _fmtDate(d);
    var entered = !isSkipDay(d);
    var item = {
      date: ds,
      d: d,
      entered: entered,
    };
    if(entered){
      var m = _genMetrics(ds, today);
      item.ht = m.ht; item.wt = m.wt; item.slp = m.slp; item.grade = m.grade;
    }
    days.push(item);
  }
  return days;
}

// ══════════════════════════════════════════════════
// 入力率ストリーク
// ══════════════════════════════════════════════════
function renderStreak(){
  var done = _cached.filter(function(it){ return it.entered; }).length;
  var total = _cached.length;
  var rate = total > 0 ? Math.round(done * 100 / total) : 0;
  // 連続入力日数（今日 or 昨日から遡って連続して入力されてる日数）
  var streak = 0;
  for(var i = 0; i < _cached.length; i++){
    if(_cached[i].entered) streak++;
    else break;
  }
  document.getElementById('streak-range').textContent = _range + '日';
  document.getElementById('streak-rate').textContent = rate;
  document.getElementById('streak-done').textContent = done;
  document.getElementById('streak-total').textContent = total;
  document.getElementById('streak-streak').textContent = streak;

  // 期間バナー更新
  var lbl = document.getElementById('period-label');
  var dr = document.getElementById('period-date-range');
  if(lbl) lbl.textContent = _rangeLabel(_range);
  if(dr && _cached.length > 0){
    var oldest = _cached[_cached.length - 1].d;
    var newest = _cached[0].d;
    var fmt = function(d){ return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate(); };
    dr.textContent = fmt(oldest) + ' 〜 ' + fmt(newest);
  }
}

// ══════════════════════════════════════════════════
// 履歴リスト描画
// ══════════════════════════════════════════════════
function renderList(){
  var list = document.getElementById('hist-list');
  if(!list) return;
  list.innerHTML = '';
  var slice = _cached.slice(0, _shown);
  slice.forEach(function(it){
    var d = it.d;
    var monthLbl = (d.getMonth()+1) + '月';
    var dayLbl = d.getDate();
    var wd = WD[d.getDay()];

    var row;
    if(!it.entered){
      row = '<div class="hist-item hist-skipped" title="未入力">'
        + '<div class="hist-date"><div class="hist-month">' + monthLbl + '</div><div class="hist-day">' + dayLbl + '</div><div class="hist-wd">' + wd + '</div></div>'
        + '<div class="hist-vals"><div class="hist-skip-msg">— 未入力 —</div></div>'
        + '<span class="badge b-mu">未入力</span>'
        + '</div>';
    } else {
      var badge;
      if(it.grade === 'ok')   badge = '<span class="badge b-ok">良好</span>';
      else if(it.grade === 'warn') badge = '<span class="badge b-warn">注意</span>';
      else                    badge = '<span class="badge b-bad">改善</span>';
      row = '<div class="hist-item">'
        + '<div class="hist-date"><div class="hist-month">' + monthLbl + '</div><div class="hist-day">' + dayLbl + '</div><div class="hist-wd">' + wd + '</div></div>'
        + '<div class="hist-vals">'
        +   '<div class="hist-ht">身長 ' + it.ht + 'cm ／ 体重 ' + it.wt + 'kg</div>'
        +   '<div class="hist-sub">睡眠 ' + it.slp + 'h ／ タンパク質: ' + (it.grade === 'ok' ? '達成' : it.grade === 'warn' ? '一部不足' : '大幅不足') + '</div>'
        + '</div>'
        + '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">'
        +   badge
        +   '<button class="edit-btn" data-date="' + it.date + '" data-ht="' + it.ht + '" data-wt="' + it.wt + '" data-slp="' + it.slp + '" onclick="editRecord(this)">✏️ 修正</button>'
        + '</div>'
        + '</div>';
    }
    list.insertAdjacentHTML('beforeend', row);
  });

  // 件数表示
  document.getElementById('record-count').textContent = '直近' + _range + '日';
  var remaining = _cached.length - slice.length;
  var moreBtn = document.getElementById('more-btn');
  if(remaining > 0){
    moreBtn.style.display = '';
    document.getElementById('more-count').textContent = remaining;
  } else {
    moreBtn.style.display = 'none';
  }
}

function showMore(){
  // 期間が長いときは展開量を増やす
  var increment = _range >= 365 ? 50 : 15;
  _shown += increment;
  renderList();
}

// ══════════════════════════════════════════════════
// 期間切り替え
// ══════════════════════════════════════════════════
function setRange(days, el){
  _range = days;
  _shown = 15;
  document.querySelectorAll('.range-tab').forEach(function(t){ t.classList.remove('act'); });
  if(el) el.classList.add('act');

  // クリック直後にスクロール位置をトップに戻す（画面が更新されたことを明示）
  var scrollEl = document.querySelector('.scroll-flat');
  if(scrollEl) scrollEl.scrollTo({ top: 0, behavior: 'smooth' });

  // 描画前にローディング表示（即座に視覚的フィードバック）
  var listEl = document.getElementById('hist-list');
  if(listEl) listEl.innerHTML = '<div style="padding:30px 0;text-align:center;color:var(--sub);font-size:11px">📊 ' + _rangeLabel(days) + 'のデータを読み込み中…</div>';

  // ストリークカードに簡易ローディング
  var streakVal = document.getElementById('streak-rate');
  if(streakVal) streakVal.textContent = '…';

  // 重い処理は次フレームに回してUIブロックを避ける
  setTimeout(function(){
    _cached = buildDays(_range);
    renderStreak();
    renderList();
    renderChart();
    // 画面トップで小さなフラッシュ通知
    showRangeToast(days);
  }, 30);
}

function _rangeLabel(days){
  if(days <= 7) return '1週間';
  if(days <= 30) return '1ヶ月';
  if(days <= 90) return '3ヶ月';
  if(days <= 180) return '6ヶ月';
  if(days <= 365) return '1年';
  if(days <= 730) return '2年';
  return '5年';
}

function showRangeToast(days){
  toast('📅 ' + _rangeLabel(days) + 'の履歴を表示しています');
}

// ══════════════════════════════════════════════════
// グラフ描画（rangeに合わせてサンプリング）
// ══════════════════════════════════════════════════
var _chart;
function renderChart(){
  var canvas = document.getElementById('c1');
  if(!canvas) return;

  // 入力済み日付のみピックアップ → 日付昇順
  var entered = _cached.filter(function(it){ return it.entered; }).sort(function(a,b){
    return _parseDate(a.date) - _parseDate(b.date);
  });

  // 多すぎる場合は間引く（最大50点表示）
  var step = Math.max(1, Math.ceil(entered.length / 50));
  var sampled = entered.filter(function(_, i){ return i % step === 0; });
  // 最後のデータ点（最新）が必ず含まれるよう調整
  if(sampled.length > 0 && entered.length > 0 && sampled[sampled.length-1] !== entered[entered.length-1]){
    sampled.push(entered[entered.length-1]);
  }

  // ラベル（期間が長いときは年月表記）
  var useYearMonth = _range >= 365;
  var labels = sampled.map(function(it){
    if(useYearMonth){
      // 'YY/M' 形式
      return (it.d.getFullYear() % 100) + '/' + (it.d.getMonth()+1);
    }
    return (it.d.getMonth()+1) + '/' + it.d.getDate();
  });
  var htData = sampled.map(function(it){ return parseFloat(it.ht); });
  var wtData = sampled.map(function(it){ return parseFloat(it.wt); });

  if(_chart) _chart.destroy();
  _chart = new Chart(canvas, {
    type:'line',
    data:{
      labels: labels,
      datasets:[
        {
          label:'身長', data: htData,
          borderColor:'#1E6FD9', backgroundColor:'rgba(30,111,217,.08)',
          borderWidth:2.5, pointRadius: sampled.length <= 12 ? 4 : 2,
          pointBackgroundColor:'#1E6FD9', fill:true, tension:.35, yAxisID:'yH'
        },
        {
          label:'体重', data: wtData,
          borderColor:'#E8A030', backgroundColor:'rgba(232,160,48,.08)',
          borderWidth:2.5, pointRadius: sampled.length <= 12 ? 4 : 2,
          pointBackgroundColor:'#E8A030', fill:false, tension:.35, yAxisID:'yW'
        }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            label:function(ctx){
              var unit = ctx.dataset.yAxisID === 'yW' ? 'kg' : 'cm';
              return ctx.dataset.label + ': ' + ctx.parsed.y + unit;
            }
          }
        }
      },
      scales:{
        x:{ grid:{display:false}, ticks:{ font:{size:8}, color:'#8FA3B8', maxTicksLimit:8 } },
        yH:{
          position:'left', grid:{ color:'rgba(0,0,0,.04)' },
          ticks:{ font:{size:9}, color:'#1E6FD9', callback:function(v){ return v + 'cm'; } }
        },
        yW:{
          position:'right', grid:{display:false},
          ticks:{ font:{size:9}, color:'#E8A030', callback:function(v){ return v + 'kg'; } }
        }
      }
    }
  });
}

// ══════════════════════════════════════════════════
// 編集
// ══════════════════════════════════════════════════
function editRecord(btn){
  var d = btn.dataset;
  var store = {
    _edit: '1',
    measure_date: d.date,
    ht: d.ht, wt: d.wt, slp: d.slp
  };
  try { localStorage.setItem('nobita_input', JSON.stringify(store)); } catch(e){}
  window.location.href = 'D-04_input_step1.html';
}

function toast(msg){
  var t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove('show'); }, 2600);
}

// ══════════════════════════════════════════════════
// 初期化
// ══════════════════════════════════════════════════
window.addEventListener('load', function(){
  _cached = buildDays(_range);
  renderStreak();
  renderList();
  renderChart();
});
</script>
</body>
</html>
