<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ProGrow — D-06 入力 STEP3 生活習慣</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0B1D35;--blue:#1E6FD9;--sky:#5DADE2;--mint:#06C755;
  --pale:#EBF3FF;--text:#0F2137;--sub:#5A6F84;--muted:#8FA3B8;
  --border:#D8E5EF;--bg:#F4F8FC;--white:#fff;
  --ok:#27AE60;--warn:#E8A030;--danger:#E53E3E;
  --line:#06C755;--purple:#6C3483;
  --font:'Plus Jakarta Sans','Noto Sans JP',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r:14px;
}
html,body{height:100%;font-family:var(--font);background:#1A2840;display:flex;align-items:center;justify-content:center;overflow:hidden}
.phone{width:390px;height:844px;background:var(--white);border-radius:44px;box-shadow:0 0 0 10px #141F30,0 0 0 12px #0D1520,0 32px 80px rgba(0,0,0,.7);overflow:hidden;display:flex;flex-direction:column;position:relative}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:34px;background:#141F30;border-radius:0 0 22px 22px;z-index:20}
.sb{height:34px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;padding-top:6px;font-size:10px;color:rgba(255,255,255,.6);font-family:var(--mono);flex-shrink:0}
.sb-light{background:var(--navy)}
.screen{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}

.scroll-white{flex:1;overflow-y:auto;padding:18px 18px 24px;background:var(--white)}
.scroll-white::-webkit-scrollbar{display:none}

.field{margin-bottom:13px}
.f-lbl{display:block;font-size:11px;font-weight:600;color:var(--text);margin-bottom:5px}
.f-req{color:var(--danger)}

.step-wrap{padding:14px 18px 18px;flex-shrink:0;background:linear-gradient(160deg,var(--navy) 0%,#1A4F8A 100%);position:relative;overflow:hidden}
.step-wrap::after{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.04);bottom:-80px;right:-50px}
.step-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:8px}
.step-title{font-size:14px;font-weight:700;color:white}
.prog{height:3px;background:rgba(255,255,255,.15);border-radius:99px;margin-bottom:12px}
.prog-fill{height:100%;border-radius:99px;background:#06C755;transition:width .4s}
.steps{display:flex;align-items:center;position:relative;z-index:1}
.s-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.s-done{background:#06C755;color:var(--navy)}
.s-act{background:white;color:var(--navy);box-shadow:0 0 0 3px rgba(255,255,255,.25)}
.s-todo{background:rgba(255,255,255,.15);color:rgba(255,255,255,.4)}
.s-lbl{font-size:7.5px;color:rgba(255,255,255,.5);margin-top:3px;text-align:center;line-height:1.2;letter-spacing:-0.02em;max-width:70px}
.s-line{flex:1;height:2px;margin:0 2px;margin-bottom:14px}
.s-line-done{background:#06C755}
.s-line-todo{background:rgba(255,255,255,.15)}

.btn{width:100%;height:50px;border-radius:var(--r);border:none;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;transition:all .18s;letter-spacing:-.01em}
.btn-blue{background:linear-gradient(135deg,#1E6FD9,#0B4DB5);color:white;box-shadow:0 4px 16px rgba(30,111,217,.3)}
.btn-ghost{background:white;color:var(--blue);border:1.5px solid var(--border)}

.num-wrap{display:flex;align-items:stretch;border:1.5px solid var(--border);border-radius:11px;overflow:hidden;height:46px;background:#FAFCFE;margin-bottom:8px}
.nm-btn{width:46px;background:var(--pale);border:none;font-size:20px;font-weight:300;color:var(--blue);cursor:pointer;padding:0;font-family:var(--font);user-select:none}
.nm-btn:hover{background:#D8E8F8}
.nm-c{flex:1;display:flex;align-items:center;justify-content:center;gap:5px}
.nm-v{text-align:center;font-family:var(--mono);font-size:20px;font-weight:600;color:var(--navy);border:none;background:transparent;outline:none;width:64px}
.nm-u{font-size:12px;color:var(--sub)}

/* 体調絵文字選択 */
.mood-row{display:flex;gap:7px;margin-bottom:6px}
.mood{flex:1;height:62px;border-radius:11px;border:1.5px solid var(--border);background:#FAFCFE;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;transition:all .15s}
.mood:hover{border-color:#BFCFDE}
.mood-emoji{font-size:24px;line-height:1}
.mood-lbl{font-size:9px;color:var(--sub);font-weight:600}
.mood.sel{background:var(--pale);border-color:var(--blue)}
.mood.sel .mood-lbl{color:var(--blue);font-weight:700}

/* 怪我チップ */
.injury-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.injury-chip{
  height:34px;border-radius:9px;border:1.5px solid var(--border);
  background:#FAFCFE;font-size:10px;font-weight:600;color:var(--sub);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  padding:0 4px;text-align:center;line-height:1.1;font-family:var(--font);
}
.injury-chip:hover{border-color:#BFCFDE}
.injury-chip.sel{background:#FFF5F5;border-color:var(--danger);color:var(--danger);font-weight:700}
.injury-chip.none-sel{background:#EAFAF1;border-color:var(--ok);color:var(--ok);font-weight:700}

/* セクション見出し */
.sec-lbl{font-size:12px;font-weight:700;color:var(--blue);margin-bottom:9px;display:flex;align-items:center;gap:7px}
.sec-lbl-dot{width:7px;height:7px;border-radius:50%;background:var(--blue)}
.sec-sub{font-size:10px;color:var(--sub);margin-bottom:9px;line-height:1.55}

/* 練習 */
.practice-card{
  background:linear-gradient(135deg,#EBF3FF,#F4F8FC);
  border:1.5px solid rgba(30,111,217,.12);
  border-radius:var(--r);padding:13px;margin-bottom:13px;
}
.practice-row{display:flex;gap:8px}
.practice-row > div{flex:1}

#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--navy);color:white;font-size:12px;font-weight:600;padding:11px 20px;border-radius:99px;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;box-shadow:0 8px 24px rgba(11,29,53,.25);pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══ iPhone等の実機モバイル対応 ══ */
@media (max-width: 480px), (max-height: 900px) {
  html, body { height:100%; background:var(--bg) !important; display:block !important; overflow:hidden; }
  .phone { width:100% !important; height:100% !important; border-radius:0 !important; box-shadow:none !important; max-width:none !important; }
  .notch { display:none !important; }
  .sb { display:none !important; }
}
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="screen">
    <div class="sb sb-light"><span>9:42</span><span>● ● 100%</span></div>
    <div class="step-wrap">
      <div class="step-top"><div class="step-title">生活習慣の入力</div><div style="background:rgba(255,255,255,.1);border-radius:99px;padding:3px 11px;font-size:10px;color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.15)">📅 毎日 / 約2分</div></div>
      <div class="prog"><div class="prog-fill" style="width:75%"></div></div>
      <div class="steps">
        <div style="display:flex;flex-direction:column;align-items:center"><div class="s-dot s-done">✓</div><div class="s-lbl">身体測定</div></div>
        <div class="s-line s-line-done"></div>
        <div style="display:flex;flex-direction:column;align-items:center"><div class="s-dot s-done">✓</div><div class="s-lbl">食事（タンパク質）</div></div>
        <div class="s-line s-line-done"></div>
        <div style="display:flex;flex-direction:column;align-items:center"><div class="s-dot s-act">3</div><div class="s-lbl">生活習慣</div></div>
        <div class="s-line s-line-todo"></div>
        <div style="display:flex;flex-direction:column;align-items:center"><div class="s-dot s-todo">4</div><div class="s-lbl">確認</div></div>
      </div>
    </div>
    <div class="scroll-white">

      <!-- 睡眠 -->
      <div class="sec-lbl"><div class="sec-lbl-dot"></div>😴 昨夜の睡眠時間</div>
      <div class="field">
        <div class="num-wrap">
          <button type="button" class="nm-btn" onclick="adj('sleep',-0.5)">−</button>
          <div class="nm-c"><input class="nm-v" id="sleep" value="7.5"><span class="nm-u">時間</span></div>
          <button type="button" class="nm-btn" onclick="adj('sleep',0.5)">＋</button>
        </div>
        <div style="font-size:10px;color:var(--sub);margin-top:2px">推奨 8時間以上 (成長期)</div>
      </div>

      <!-- 体調 -->
      <div class="sec-lbl"><div class="sec-lbl-dot"></div>💪 今日の体調</div>
      <div class="field">
        <div class="mood-row">
          <div class="mood" data-val="1" onclick="setMood(this,1)"><div class="mood-emoji">😞</div><div class="mood-lbl">不調</div></div>
          <div class="mood" data-val="2" onclick="setMood(this,2)"><div class="mood-emoji">😕</div><div class="mood-lbl">いまいち</div></div>
          <div class="mood sel" data-val="3" onclick="setMood(this,3)"><div class="mood-emoji">😊</div><div class="mood-lbl">普通</div></div>
          <div class="mood" data-val="4" onclick="setMood(this,4)"><div class="mood-emoji">😄</div><div class="mood-lbl">好調</div></div>
          <div class="mood" data-val="5" onclick="setMood(this,5)"><div class="mood-emoji">🤩</div><div class="mood-lbl">絶好調</div></div>
        </div>
      </div>

      <!-- 練習 -->
      <div class="sec-lbl"><div class="sec-lbl-dot"></div>🏃 今日の練習</div>
      <div class="sec-sub">今日の練習時間と週活動日数を入力してください</div>
      <div class="practice-card">
        <div class="practice-row">
          <div>
            <label class="f-lbl">練習時間</label>
            <div class="num-wrap">
              <button type="button" class="nm-btn" onclick="adj('ptime',-0.5)">−</button>
              <div class="nm-c"><input class="nm-v" id="ptime" value="2.0"><span class="nm-u">h</span></div>
              <button type="button" class="nm-btn" onclick="adj('ptime',0.5)">＋</button>
            </div>
          </div>
          <div>
            <label class="f-lbl">週の活動日数</label>
            <div class="num-wrap">
              <button type="button" class="nm-btn" onclick="adj('pdays',-1)">−</button>
              <div class="nm-c"><input class="nm-v" id="pdays" value="5"><span class="nm-u">日</span></div>
              <button type="button" class="nm-btn" onclick="adj('pdays',1)">＋</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 怪我 -->
      <div class="sec-lbl"><div class="sec-lbl-dot"></div>🩹 半年以内の怪我の有無</div>
      <div class="sec-sub">該当するものをすべて選択。怪我がない場合は「なし」を選んでください</div>
      <div class="field">
        <div class="injury-grid">
          <div class="injury-chip" data-val="関節" onclick="toggleInjury(this)">関節</div>
          <div class="injury-chip" data-val="靭帯" onclick="toggleInjury(this)">靭帯</div>
          <div class="injury-chip" data-val="肉離れ" onclick="toggleInjury(this)">肉離れ</div>
          <div class="injury-chip" data-val="捻挫" onclick="toggleInjury(this)">捻挫</div>
          <div class="injury-chip" data-val="オスグット" onclick="toggleInjury(this)">オスグット</div>
          <div class="injury-chip" data-val="疲労骨折" onclick="toggleInjury(this)">疲労骨折</div>
          <div class="injury-chip" data-val="骨折" onclick="toggleInjury(this)">骨折</div>
          <div class="injury-chip" data-val="腰椎分離症" onclick="toggleInjury(this)">腰椎分離症</div>
          <div class="injury-chip" data-val="その他" onclick="toggleInjury(this)">その他</div>
          <div class="injury-chip none-sel" data-val="なし" onclick="toggleInjury(this)" style="grid-column:span 3">✓ 怪我なし</div>
        </div>
      </div>

      <button class="btn btn-blue" onclick="saveCurrent();window.location.href='D-07_input_step4.html'">次へ → 入力内容を確認</button>
      <button class="btn btn-ghost" onclick="location.href='D-05_input_step2.html'">← 戻る</button>
      <div style="text-align:center;font-size:11px;color:var(--danger);cursor:pointer;margin-top:4px" onclick="cancelInput()">✕ 入力を中止する</div>

    </div>
  </div>
</div>

<div id="toast"></div>

<script>
var _numCfg = {
  sleep: { step:.5, min:0, max:14, dec:1 },
  ptime: { step:.5, min:0, max:8, dec:1 },
  pdays: { step:1, min:0, max:7, dec:0 }
};
function adj(id, delta){
  var inp = document.getElementById(id);
  if(!inp) return;
  var c = _numCfg[id];
  var v = parseFloat(inp.value);
  if(isNaN(v)) v = 0;
  v = Math.max(c.min, Math.min(c.max, v + delta));
  inp.value = c.dec === 0 ? String(Math.round(v)) : v.toFixed(c.dec);
}

var _mood = 3;
function setMood(el, v){
  document.querySelectorAll('.mood').forEach(function(m){ m.classList.remove('sel'); });
  el.classList.add('sel');
  _mood = v;
}

var _injuries = new Set(['なし']);
function toggleInjury(el){
  var val = el.dataset.val;
  if(val === 'なし'){
    document.querySelectorAll('.injury-chip').forEach(function(c){
      c.classList.remove('sel'); c.classList.remove('none-sel');
    });
    el.classList.add('none-sel');
    _injuries = new Set(['なし']);
    return;
  }
  var noneEl = document.querySelector('.injury-chip[data-val="なし"]');
  if(noneEl){ noneEl.classList.remove('none-sel'); }
  _injuries.delete('なし');
  if(_injuries.has(val)){
    _injuries.delete(val);
    el.classList.remove('sel');
  } else {
    _injuries.add(val);
    el.classList.add('sel');
  }
  if(_injuries.size === 0){
    if(noneEl){ noneEl.classList.add('none-sel'); }
    _injuries.add('なし');
  }
}

var _STORE = 'nobita_input';
function loadPrev(){
  try{
    var s = JSON.parse(localStorage.getItem(_STORE) || '{}');
    if(s.sleep !== undefined){ var sl = document.getElementById('sleep'); if(sl) sl.value = s.sleep; }
    if(s.ptime !== undefined){ var pt = document.getElementById('ptime'); if(pt) pt.value = s.ptime; }
    if(s.pdays !== undefined){ var pd = document.getElementById('pdays'); if(pd) pd.value = s.pdays; }
    if(s.mood !== undefined){
      var mv = parseInt(s.mood, 10);
      document.querySelectorAll('.mood').forEach(function(m){
        m.classList.remove('sel');
        if(parseInt(m.dataset.val,10) === mv) m.classList.add('sel');
      });
      _mood = mv;
    }
    if(s.injuries){
      try{
        var arr = JSON.parse(s.injuries);
        document.querySelectorAll('.injury-chip').forEach(function(c){ c.classList.remove('sel'); c.classList.remove('none-sel'); });
        _injuries = new Set();
        if(arr.indexOf('なし') !== -1 || arr.length === 0){
          var ne = document.querySelector('.injury-chip[data-val="なし"]');
          if(ne) ne.classList.add('none-sel');
          _injuries = new Set(['なし']);
        } else {
          arr.forEach(function(v){
            var el = document.querySelector('.injury-chip[data-val="' + v + '"]');
            if(el){ el.classList.add('sel'); _injuries.add(v); }
          });
        }
      }catch(e){}
    }
  }catch(e){}
}

function saveCurrent(){
  try{
    var existing = JSON.parse(localStorage.getItem(_STORE) || '{}');
    var sl = document.getElementById('sleep'); if(sl) existing.sleep = sl.value;
    var pt = document.getElementById('ptime'); if(pt) existing.ptime = pt.value;
    var pd = document.getElementById('pdays'); if(pd) existing.pdays = pd.value;
    existing.mood = _mood;
    existing.injuries = JSON.stringify(Array.from(_injuries));
    localStorage.setItem(_STORE, JSON.stringify(existing));
  }catch(e){}
}

function cancelInput(){
  if(confirm('入力を中止してホーム画面に戻りますか？\n入力中のデータは保存されません。')){
    window.location.href = 'D-01_dashboard.html';
  }
}

function toast(msg){
  var t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove('show'); }, 2600);
}

window.addEventListener('load', loadPrev);
</script>
</body>
</html>
