<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nobita — D-04 入力 STEP1 身体測定</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- カレンダーは純HTML/JS実装（外部依存なし） -->
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0B1D35;--blue:#1E6FD9;--sky:#5DADE2;--mint:#06C755;
  --pale:#EBF3FF;--text:#0F2137;--sub:#5A6F84;--muted:#8FA3B8;
  --border:#D8E5EF;--bg:#F4F8FC;--white:#fff;
  --ok:#27AE60;--warn:#E8A030;--danger:#E53E3E;
  --ok-bg:#EAFAF1;--warn-bg:#FFF7E6;--danger-bg:#FFF5F5;
  --line:#06C755;--purple:#6C3483;
  --font:'Plus Jakarta Sans','Noto Sans JP',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r:14px;
}
html,body{height:100%;font-family:var(--font);background:#1A2840;display:flex;align-items:center;justify-content:center;overflow:hidden}
.phone{width:390px;height:844px;background:var(--white);border-radius:44px;box-shadow:0 0 0 10px #141F30,0 0 0 12px #0D1520,0 32px 80px rgba(0,0,0,.7);overflow:hidden;display:flex;flex-direction:column;position:relative}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:34px;background:#141F30;border-radius:0 0 22px 22px;z-index:20}
.sb{height:34px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;padding-top:6px;font-size:10px;color:rgba(255,255,255,.6);font-family:var(--mono);flex-shrink:0}
.sb-light{background:var(--navy)}
.screen{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}

.scroll-white{flex:1;overflow-y:auto;padding:20px 18px 24px;background:var(--white)}
.scroll-white::-webkit-scrollbar{display:none}

.field{margin-bottom:13px}
.f-lbl{display:block;font-size:11px;font-weight:600;color:var(--text);margin-bottom:5px}
.f-req{color:var(--danger)}

.step-wrap{padding:14px 18px 18px;flex-shrink:0;background:linear-gradient(160deg,var(--navy) 0%,#1A4F8A 100%);position:relative;overflow:hidden}
.step-wrap::after{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.04);bottom:-80px;right:-50px}
.step-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:8px}
.step-title{font-size:14px;font-weight:700;color:white}
.prog{height:3px;background:rgba(255,255,255,.15);border-radius:99px;margin-bottom:12px}
.prog-fill{height:100%;border-radius:99px;background:#06C755;transition:width .4s}
.steps{display:flex;align-items:center;position:relative;z-index:1}
.s-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.s-act{background:white;color:var(--navy);box-shadow:0 0 0 3px rgba(255,255,255,.25)}
.s-todo{background:rgba(255,255,255,.15);color:rgba(255,255,255,.4)}
.s-lbl{font-size:8px;color:rgba(255,255,255,.5);margin-top:3px;white-space:nowrap}
.s-line{flex:1;height:2px;margin:0 2px;margin-bottom:14px}
.s-line-todo{background:rgba(255,255,255,.15)}

.btn{width:100%;height:50px;border-radius:var(--r);border:none;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;transition:all .18s;letter-spacing:-.01em}
.btn-blue{background:linear-gradient(135deg,#1E6FD9,#0B4DB5);color:white;box-shadow:0 4px 16px rgba(30,111,217,.3)}
.btn-ghost{background:white;color:var(--blue);border:1.5px solid var(--border)}

/* Number input — +/- ボタン */
.num-wrap{display:flex;align-items:stretch;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;height:50px;background:#FAFCFE;margin-bottom:10px}
.nm-btn{width:50px;background:var(--pale);border:none;font-size:22px;font-weight:300;color:var(--blue);cursor:pointer;padding:0;font-family:var(--font);user-select:none}
.nm-btn:hover{background:#D8E8F8}
.nm-btn:active{background:#C5D9EA}
.nm-c{flex:1;display:flex;align-items:center;justify-content:center;gap:5px}
.nm-v{text-align:center;font-family:var(--mono);font-size:22px;font-weight:600;color:var(--navy);border:none;background:transparent;outline:none;width:64px}
.nm-u{font-size:12px;color:var(--sub)}

.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap}
.b-blue{background:var(--pale);color:var(--blue);border:1px solid rgba(30,111,217,.2)}
.b-warn{background:var(--warn-bg);color:var(--warn);border:1px solid rgba(232,160,48,.2)}

/* ══ Nobita 純HTMLカレンダー ══ */
.nbcal-wrap{width:100%}
.nbcal{width:100%;font-family:var(--font)}
.nbcal-cap{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px}
.nbcal-cap-lbl{font-size:13px;font-weight:700;color:var(--navy);letter-spacing:-.01em}
.nbcal-nav{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:white;color:var(--blue);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0}
.nbcal-nav:hover:not(:disabled){background:var(--pale);border-color:var(--blue)}
.nbcal-nav:disabled{opacity:.3;cursor:not-allowed}
.nbcal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:0;margin-bottom:4px}
.nbcal-hcell{text-align:center;font-size:10px;font-weight:600;color:var(--sub);padding:6px 0}
.nbcal-hcell.sun{color:var(--danger)}
.nbcal-hcell.sat{color:var(--blue)}
.nbcal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.nbcal-day{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text);
  border-radius:50%;cursor:pointer;background:transparent;border:none;
  transition:all .12s;padding:0;
}
.nbcal-day:not(:disabled):hover{background:var(--pale)}
.nbcal-day.outside{visibility:hidden}
.nbcal-day.sun{color:var(--danger)}
.nbcal-day.sat{color:var(--blue)}
.nbcal-day.today:not(.selected){
  font-weight:800;color:var(--blue);
  border:1.5px solid var(--blue);
}
.nbcal-day.selected{
  background:var(--blue) !important;color:white !important;font-weight:700;
  box-shadow:0 3px 10px rgba(30,111,217,.35);
}
.nbcal-day.recorded{
  text-decoration:line-through;color:#CBD5DF;cursor:not-allowed;
}
.nbcal-day.recorded:hover{background:transparent}
.nbcal-day.disabled{opacity:.3;cursor:not-allowed}
.nbcal-day.disabled:hover{background:transparent}

/* 凡例 */
.dp-legend{display:flex;gap:10px;flex-wrap:wrap;padding:8px 10px;background:#FAFCFE;border-radius:9px;border:1px solid var(--border);margin-top:10px}
.dp-leg{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--sub)}
.dp-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dp-dot-bord{border:1.5px solid var(--blue);background:white}
.dp-dot-rec{background:#CBD5DF}

/* ══ アコーディオン トリガー（選択日表示） ══ */
.dp-selected{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:11px 12px;border-radius:11px;margin-bottom:0;border:1.5px solid;
  cursor:pointer;transition:all .18s;user-select:none;
}
.dp-selected:hover{filter:brightness(.98);box-shadow:0 2px 8px rgba(11,29,53,.07)}
.dp-selected:active{transform:scale(.99)}
.dp-sel-ok  {background:#EAFAF1;border-color:#A9DFBF}
.dp-sel-warn{background:#FFF7E6;border-color:#F8C471}
.dp-sel-def {background:#FAFCFE;border-color:var(--border)}
.dp-sel-lbl{font-size:10px;font-weight:700;color:var(--sub)}
.dp-sel-val{font-size:13px;font-weight:700;color:var(--navy);flex:1}
.dp-sel-chev{
  width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.7);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--sub);
  transition:transform .25s ease;flex-shrink:0;font-weight:700;
}
.dp-selected.open .dp-sel-chev{transform:rotate(180deg)}

/* ══ アコーディオン本体 ══ */
.nbcal-body{
  overflow:hidden;
  max-height:0;opacity:0;
  transition:max-height .3s ease, opacity .2s ease, margin-top .25s ease, padding .2s ease;
  margin-top:0;padding:0 0;
  background:white;border-radius:12px;
}
.nbcal-body.open{
  max-height:520px;opacity:1;margin-top:10px;padding:4px 0 2px;
  border:1px solid var(--border);
  padding:12px;
}

/* エラー */
.dp-err{
  background:var(--danger-bg);border:1px solid #F9BABA;border-radius:9px;
  padding:8px 11px;font-size:11px;font-weight:600;color:var(--danger);
  display:flex;align-items:center;gap:6px;margin-top:8px;
}
.dp-err.hidden{display:none}

#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--navy);color:white;font-size:12px;font-weight:600;padding:11px 20px;border-radius:99px;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;box-shadow:0 8px 24px rgba(11,29,53,.25);pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══ iPhone等の実機モバイル対応 ══ */
@media (max-width: 480px), (max-height: 900px) {
  html, body { height:100%; background:var(--bg) !important; display:block !important; overflow:hidden; }
  .phone { width:100% !important; height:100% !important; border-radius:0 !important; box-shadow:none !important; max-width:none !important; }
  .notch { display:none !important; }
  .sb { display:none !important; }
  .bnav { padding-bottom: calc(9px + env(safe-area-inset-bottom)) !important; }
}
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="screen">
    <div class="sb sb-light"><span>9:41</span><span>● ● 100%</span></div>
    <div class="step-wrap">
      <div class="step-top"><div class="step-title">月次測定入力</div><div style="background:rgba(255,255,255,.1);border-radius:99px;padding:3px 11px;font-size:10px;color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.15)">📅 月1回 / 3分</div></div>
      <div class="prog"><div class="prog-fill" style="width:25%"></div></div>
      <div class="steps">
        <div style="display:flex;flex-direction:column;align-items:center"><div class="s-dot s-act">1</div><div class="s-lbl">身体測定</div></div>
        <div class="s-line s-line-todo"></div>
        <div style="display:flex;flex-direction:column;align-items:center"><div class="s-dot s-todo">2</div><div class="s-lbl">生活習慣</div></div>
        <div class="s-line s-line-todo"></div>
        <div style="display:flex;flex-direction:column;align-items:center"><div class="s-dot s-todo">3</div><div class="s-lbl">プロテイン</div></div>
        <div class="s-line s-line-todo"></div>
        <div style="display:flex;flex-direction:column;align-items:center"><div class="s-dot s-todo">4</div><div class="s-lbl">確認</div></div>
      </div>
    </div>
    <div class="scroll-white">

      <!-- 日付選択（アコーディオン式 純HTMLカレンダー） -->
      <div class="field" style="margin-bottom:4px">
        <label class="f-lbl">📅 測定日 <span class="f-req">*</span></label>
        <div id="picker-root"></div>
      </div>

      <div style="height:1px;background:var(--border);margin:16px 0"></div>
      <div style="font-size:12px;font-weight:700;color:var(--blue);margin-bottom:12px;display:flex;align-items:center;gap:7px"><div style="width:7px;height:7px;border-radius:50%;background:var(--blue)"></div>身長・体重の入力</div>

      <div class="field">
        <label class="f-lbl">身長 <span class="f-req">*</span><span style="font-size:10px;color:var(--sub);font-weight:400;margin-left:6px">前回：161.2cm</span></label>
        <div class="num-wrap">
          <button type="button" class="nm-btn" onclick="adj('ht',-0.1)">−</button>
          <div class="nm-c"><input class="nm-v" id="ht" value="161.2"><span class="nm-u">cm</span></div>
          <button type="button" class="nm-btn" onclick="adj('ht',0.1)">＋</button>
        </div>
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:4px"><div style="flex:1;height:5px;background:#EEF2F7;border-radius:99px;overflow:hidden"><div style="width:68%;height:100%;background:linear-gradient(90deg,#1E6FD9,#06C755);border-radius:99px"></div></div><div style="font-size:11px;color:var(--ok);font-weight:700">↑ +1.2cm</div></div>
      </div>

      <div class="field">
        <label class="f-lbl">体重 <span class="f-req">*</span><span style="font-size:10px;color:var(--sub);font-weight:400;margin-left:6px">前回：52.3kg</span></label>
        <div class="num-wrap">
          <button type="button" class="nm-btn" onclick="adj('wt',-0.1)">−</button>
          <div class="nm-c"><input class="nm-v" id="wt" value="52.3"><span class="nm-u">kg</span></div>
          <button type="button" class="nm-btn" onclick="adj('wt',0.1)">＋</button>
        </div>
      </div>

      <div style="height:1px;background:var(--border);margin:14px 0"></div>
      <div style="font-size:12px;font-weight:700;color:var(--blue);margin-bottom:12px;display:flex;align-items:center;gap:7px"><div style="width:7px;height:7px;border-radius:50%;background:var(--blue)"></div>骨端線幅（任意）</div>

      <div class="field" style="margin-bottom:12px">
        <div class="num-wrap">
          <button type="button" class="nm-btn" onclick="adj('ep',-0.1)">−</button>
          <div class="nm-c"><input class="nm-v" id="ep" value="3.2"><span class="nm-u">mm</span></div>
          <button type="button" class="nm-btn" onclick="adj('ep',0.1)">＋</button>
        </div>
      </div>

      <div style="background:var(--pale);border:1px solid rgba(30,111,217,.2);border-radius:12px;padding:12px;display:flex;gap:10px;margin-bottom:10px">
        <div style="text-align:center;flex:1"><div style="font-size:9px;color:var(--sub);margin-bottom:2px">遺伝的予想</div><div style="font-family:var(--mono);font-size:18px;font-weight:800;color:var(--navy)">175.0cm</div><div style="font-size:9px;color:var(--ok)">自動計算 ✓</div></div>
        <div style="width:1px;background:var(--border)"></div>
        <div style="text-align:center;flex:1"><div style="font-size:9px;color:var(--sub);margin-bottom:2px">最大到達予想</div><div style="font-family:var(--mono);font-size:18px;font-weight:800;color:var(--navy)">177.2cm</div><div style="font-size:9px;color:var(--ok)">自動計算 ✓</div></div>
      </div>

      <!-- 1年以内の身長ポテンシャル（骨端線幅×2） -->
      <div style="background:linear-gradient(135deg,#E8FAF0,#EBF3FF);border:1.5px solid rgba(6,199,85,.3);border-radius:12px;padding:13px;margin-bottom:18px;display:flex;align-items:center;gap:12px">
        <div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#06C755,#1E6FD9);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 3px 10px rgba(6,199,85,.3)">🚀</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:10px;color:var(--sub);font-weight:600;margin-bottom:2px">1年以内の身長ポテンシャル</div>
          <div style="display:flex;align-items:baseline;gap:5px">
            <span style="font-size:10px;color:var(--sub)">+</span>
            <span id="potential-val" style="font-family:var(--mono);font-size:24px;font-weight:800;color:var(--ok);line-height:1">6.4</span>
            <span style="font-size:11px;color:var(--ok);font-weight:700">cm / 年</span>
          </div>
          <div style="font-size:9px;color:var(--sub);margin-top:2px">骨端線幅 × 2 で自動計算</div>
        </div>
      </div>

      <button type="button" class="btn btn-blue" id="next-btn" onclick="goNext()">次へ → 生活習慣の入力</button>
      <button type="button" class="btn btn-ghost" onclick="location.href='D-01_dashboard.html'">← ダッシュボードに戻る</button>
      <div style="text-align:center;font-size:11px;color:var(--danger);cursor:pointer;margin-top:4px" onclick="cancelInput()">✕ 入力を中止する</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
// +/- ボタン
// ══════════════════════════════════════════════════════════════
var _numCfg = {
  ht: { step:0.1, min:100, max:250 },
  wt: { step:0.1, min:20,  max:200 },
  ep: { step:0.1, min:0,   max:20  }
};
function adj(id, delta){
  var inp = document.getElementById(id);
  if(!inp) return;
  var c = _numCfg[id];
  var v = Math.round((parseFloat(inp.value) + delta) * 10) / 10;
  if(isNaN(v)) v = c.min;
  v = Math.max(c.min, Math.min(c.max, v));
  inp.value = v.toFixed(1);
  if(id === 'ep') _renderPotential();
}

// 骨端線幅 × 2 = 1年以内の身長ポテンシャル（年間予想伸び幅）
function _renderPotential(){
  var ep = parseFloat((document.getElementById('ep') || {}).value || '0');
  var potential = Math.round(ep * 2 * 10) / 10;
  var el = document.getElementById('potential-val');
  if(el) el.textContent = potential.toFixed(1);
}

// ══════════════════════════════════════════════════════════════
// localStorage 保存・復元
// ══════════════════════════════════════════════════════════════
var _KEYS    = ['ht', 'wt', 'ep'];
var _DEFAULT = { ht:'161.2', wt:'52.3', ep:'3.2' };
var _STORE   = 'nobita_input';

function loadPrev(){
  try{
    var saved = JSON.parse(localStorage.getItem(_STORE) || '{}');
    _KEYS.forEach(function(k){
      var inp = document.getElementById(k);
      if(!inp) return;
      inp.value = (saved[k] !== undefined) ? saved[k] : _DEFAULT[k];
    });
    _renderPotential();
  }catch(e){}
}
function saveCurrent(){
  try{
    var existing = JSON.parse(localStorage.getItem(_STORE) || '{}');
    _KEYS.forEach(function(k){
      var inp = document.getElementById(k);
      if(inp) existing[k] = inp.value;
    });
    if(window._selectedDateStr) existing.measure_date = window._selectedDateStr;
    localStorage.setItem(_STORE, JSON.stringify(existing));
  }catch(e){}
}

function goNext(){
  saveCurrent();
  window.location.href = 'D-05_input_step2.html';
}
function cancelInput(){
  if(confirm('入力を中止してホーム画面に戻りますか？\n入力中のデータは保存されません。')){
    window.location.href = 'D-01_dashboard.html';
  }
}

// ══════════════════════════════════════════════════════════════
// アコーディオン式カレンダー
// ══════════════════════════════════════════════════════════════
window._selectedDateStr = null;
window._dateValid = true;

var WEEKDAYS = ['日','月','火','水','木','金','土'];
var MONTHS   = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function _today(){ var d = new Date(); d.setHours(0,0,0,0); return d; }
function _fmtDate(d){ return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function _parseDate(s){ var p = s.split('-').map(Number); return new Date(p[0], p[1]-1, p[2]); }
function _sameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }

var _cal = { viewYear:null, viewMonth:null, selected:null, recorded:[], editingDate:null, open:false };

function mountPicker(){
  var root = document.getElementById('picker-root');
  if(!root) return;

  var today = _today();

  var saved = {};
  try{ saved = JSON.parse(localStorage.getItem('nobita_input') || '{}'); }catch(e){}
  var isEdit = saved._edit === '1';
  _cal.editingDate = isEdit ? saved.measure_date : null;

  try{
    var hist = JSON.parse(localStorage.getItem('nobita_history') || '[]');
    _cal.recorded = hist.filter(function(s){ return s !== _cal.editingDate; });
  }catch(e){ _cal.recorded = []; }

  if(isEdit){
    try{ delete saved._edit; localStorage.setItem('nobita_input', JSON.stringify(saved)); }catch(e){}
  }

  var initDate = (isEdit && _cal.editingDate) ? _parseDate(_cal.editingDate) : today;
  _cal.selected = initDate;
  _cal.viewYear = initDate.getFullYear();
  _cal.viewMonth = initDate.getMonth();

  window._selectedDateStr = _fmtDate(initDate);
  window._dateValid = true;

  var headHtml = WEEKDAYS.map(function(w, i){
    var cls = i === 0 ? 'sun' : i === 6 ? 'sat' : '';
    return '<div class="nbcal-hcell ' + cls + '">' + w + '</div>';
  }).join('');

  root.innerHTML =
    '<div class="nbcal-wrap">' +
      '<div id="nbcal-selected" class="dp-selected dp-sel-ok" role="button" tabindex="0" aria-expanded="false"></div>' +
      '<div id="nbcal-body" class="nbcal-body">' +
        '<div class="nbcal">' +
          '<div class="nbcal-cap">' +
            '<button type="button" class="nbcal-nav" id="nbcal-prev" aria-label="前の月">‹</button>' +
            '<div class="nbcal-cap-lbl" id="nbcal-caption">—</div>' +
            '<button type="button" class="nbcal-nav" id="nbcal-next" aria-label="次の月">›</button>' +
          '</div>' +
          '<div class="nbcal-head">' + headHtml + '</div>' +
          '<div class="nbcal-grid" id="nbcal-grid"></div>' +
        '</div>' +
        '<div id="nbcal-error" class="dp-err hidden"><span>🚫</span><span id="nbcal-error-msg"></span></div>' +
        '<div class="dp-legend">' +
          '<div class="dp-leg"><div class="dp-dot" style="background:#1E6FD9"></div><span>選択中</span></div>' +
          '<div class="dp-leg"><div class="dp-dot dp-dot-bord"></div><span>今日</span></div>' +
          '<div class="dp-leg"><div class="dp-dot dp-dot-rec"></div><span>入力済み（選択不可）</span></div>' +
        '</div>' +
      '</div>' +
    '</div>';

  // アコーディオン トリガー
  var trigger = document.getElementById('nbcal-selected');
  trigger.addEventListener('click', _toggleCal);
  trigger.addEventListener('keydown', function(e){
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); _toggleCal(); }
  });

  document.getElementById('nbcal-prev').addEventListener('click', function(){ _navMonth(-1); });
  document.getElementById('nbcal-next').addEventListener('click', function(){ _navMonth(1); });

  _renderCalendar();
}

function _toggleCal(){
  _cal.open = !_cal.open;
  _applyOpenState();
}
function _openCal(){
  if(!_cal.open){ _cal.open = true; _applyOpenState(); }
}
function _closeCal(){
  if(_cal.open){ _cal.open = false; _applyOpenState(); }
}
function _applyOpenState(){
  var trigger = document.getElementById('nbcal-selected');
  var body = document.getElementById('nbcal-body');
  if(!trigger || !body) return;
  if(_cal.open){
    trigger.classList.add('open');
    body.classList.add('open');
    trigger.setAttribute('aria-expanded', 'true');
  } else {
    trigger.classList.remove('open');
    body.classList.remove('open');
    trigger.setAttribute('aria-expanded', 'false');
  }
}

function _navMonth(delta){
  var today = _today();
  var y = _cal.viewYear, m = _cal.viewMonth + delta;
  if(m < 0){ y -= 1; m = 11; }
  if(m > 11){ y += 1; m = 0; }
  var minDate = new Date(today.getFullYear(), today.getMonth() - 11, 1);
  var maxDate = new Date(today.getFullYear(), today.getMonth(), 1);
  var target = new Date(y, m, 1);
  if(target < minDate || target > maxDate) return;
  _cal.viewYear = y;
  _cal.viewMonth = m;
  _renderCalendar();
}

function _renderCalendar(){
  var today = _today();
  var y = _cal.viewYear, m = _cal.viewMonth;
  document.getElementById('nbcal-caption').textContent = y + '年 ' + MONTHS[m];

  var minDate = new Date(today.getFullYear(), today.getMonth() - 11, 1);
  var maxDate = new Date(today.getFullYear(), today.getMonth(), 1);
  document.getElementById('nbcal-prev').disabled = new Date(y, m-1, 1) < minDate;
  document.getElementById('nbcal-next').disabled = new Date(y, m+1, 1) > maxDate;

  var firstDay = new Date(y, m, 1);
  var lastDay = new Date(y, m+1, 0);
  var startWeekday = firstDay.getDay();
  var daysInMonth = lastDay.getDate();
  var recordedSet = {};
  _cal.recorded.forEach(function(s){ recordedSet[s] = true; });

  var grid = document.getElementById('nbcal-grid');
  var html = '';
  for(var i = 0; i < startWeekday; i++){
    html += '<button type="button" class="nbcal-day outside" disabled></button>';
  }
  for(var d = 1; d <= daysInMonth; d++){
    var date = new Date(y, m, d);
    var dateStr = _fmtDate(date);
    var weekday = date.getDay();
    var isFuture = date > today;
    var isRecorded = !!recordedSet[dateStr];
    var isToday = _sameDay(date, today);
    var isSelected = _cal.selected && _sameDay(date, _cal.selected);

    var cls = ['nbcal-day'];
    if(weekday === 0) cls.push('sun');
    if(weekday === 6) cls.push('sat');
    if(isToday) cls.push('today');
    if(isSelected) cls.push('selected');
    if(isRecorded) cls.push('recorded');
    if(isFuture) cls.push('disabled');

    var isDisabled = isFuture || isRecorded;
    var reason = isFuture ? 'future' : isRecorded ? 'recorded' : '';
    html += '<button type="button" class="' + cls.join(' ') + '" ' +
            'data-date="' + dateStr + '" ' +
            'data-disabled="' + (isDisabled ? '1' : '0') + '" ' +
            'data-reason="' + reason + '">' + d + '</button>';
  }
  grid.innerHTML = html;

  var dayButtons = grid.querySelectorAll('.nbcal-day[data-date]');
  for(var k = 0; k < dayButtons.length; k++){
    dayButtons[k].addEventListener('click', function(e){
      e.stopPropagation();
      _handleDayClick(this);
    });
  }

  _renderSelectedDisplay();
}

function _handleDayClick(btn){
  var dateStr = btn.dataset.date;
  var date = _parseDate(dateStr);
  var isDisabled = btn.dataset.disabled === '1';
  var reason = btn.dataset.reason;

  var errBox = document.getElementById('nbcal-error');
  var errMsg = document.getElementById('nbcal-error-msg');

  if(isDisabled){
    errMsg.textContent = reason === 'future'
      ? '未来の日付は選択できません。別の日付を選んでください。'
      : 'この日付はすでに入力済みです。別の日付を選んでください。';
    errBox.classList.remove('hidden');
    return;
  }

  errBox.classList.add('hidden');
  _cal.selected = date;
  window._selectedDateStr = dateStr;
  window._dateValid = true;

  try{
    var s = JSON.parse(localStorage.getItem('nobita_input') || '{}');
    s.measure_date = dateStr;
    localStorage.setItem('nobita_input', JSON.stringify(s));
  }catch(e){}

  _renderCalendar();

  // 日付選択後は自動で閉じる
  setTimeout(_closeCal, 180);
}

function _renderSelectedDisplay(){
  var sel = _cal.selected;
  var today = _today();
  var box = document.getElementById('nbcal-selected');
  if(!box) return;

  var openCls = _cal.open ? ' open' : '';

  if(!sel){
    box.className = 'dp-selected dp-sel-def' + openCls;
    box.innerHTML =
      '<span class="dp-sel-lbl">測定日</span>' +
      '<span class="dp-sel-val">日付を選択してください</span>' +
      '<span class="dp-sel-chev" aria-hidden="true">▾</span>';
    return;
  }

  var isToday = _sameDay(sel, today);
  var isPast  = sel < today;
  var txt = sel.getFullYear() + '年' + (sel.getMonth()+1) + '月' + sel.getDate() + '日（' + WEEKDAYS[sel.getDay()] + '）';
  var cls = isToday ? 'dp-selected dp-sel-ok'
          : isPast  ? 'dp-selected dp-sel-warn'
          :           'dp-selected dp-sel-def';
  box.className = cls + openCls;

  var badge = '';
  if(isToday) badge = '<span class="badge b-blue" style="font-size:9px;padding:2px 7px">今日</span>';
  else if(isPast) badge = '<span class="badge b-warn" style="font-size:9px;padding:2px 7px">⚠ 入力忘れ</span>';

  box.innerHTML =
    '<span class="dp-sel-lbl">測定日</span>' +
    '<span class="dp-sel-val">' + txt + '</span>' +
    badge +
    '<span class="dp-sel-chev" aria-hidden="true">▾</span>';
}

function markDateAsRecorded(date){
  try{
    var hist = JSON.parse(localStorage.getItem('nobita_history') || '[]');
    if(hist.indexOf(date) === -1) hist.push(date);
    localStorage.setItem('nobita_history', JSON.stringify(hist));
  }catch(e){}
}

// ══════════════════════════════════════════════════════════════
// デモデータ：月1回コンセプトに沿い、過去24ヶ月分を月1件ずつ投入
// （各月の中旬・直近の土曜を測定日とする。今月と未来月は除外）
// ══════════════════════════════════════════════════════════════
function seedHistoryDemo(){
  try{
    var today = _today();
    var hist = [];
    try{ hist = JSON.parse(localStorage.getItem('nobita_history') || '[]'); }catch(e){}

    // 既に過去12ヶ月分以上のデータがあれば再投入しない
    if(hist.length >= 12) return;

    var seeded = {};
    hist.forEach(function(s){ seeded[s] = true; });

    // 過去24ヶ月分を遡って、各月の中旬・直近土曜を測定日として投入
    for(var i = 1; i <= 24; i++){
      var d = new Date(today.getFullYear(), today.getMonth() - i, 15);
      // その月の15日から最寄りの土曜を探す（測定は週末イメージ）
      while(d.getDay() !== 6){
        d.setDate(d.getDate() + 1);
        if(d.getMonth() !== new Date(today.getFullYear(), today.getMonth() - i, 1).getMonth()){
          // 月をまたいだら15日から逆方向に探し直す
          d = new Date(today.getFullYear(), today.getMonth() - i, 15);
          while(d.getDay() !== 6){
            d.setDate(d.getDate() - 1);
          }
          break;
        }
      }
      // 今日以降はスキップ（保険）
      if(d >= today) continue;
      seeded[_fmtDate(d)] = true;
    }

    var merged = Object.keys(seeded).sort();
    localStorage.setItem('nobita_history', JSON.stringify(merged));
  }catch(e){
    console.error('seedHistoryDemo failed:', e);
  }
}

function toast(msg){
  var t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove('show'); }, 2600);
}

// 初期化
function _initD04(){
  try{ loadPrev(); }catch(e){ console.error('loadPrev failed:', e); }
  try{ seedHistoryDemo(); }catch(e){ console.error('seedHistoryDemo failed:', e); }
  try{ mountPicker(); }catch(e){ console.error('mountPicker failed:', e); }
}
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', _initD04);
} else {
  _initD04();
}
</script>
