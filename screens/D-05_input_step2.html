<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ProGrow — D-05 入力 STEP2 食事（タンパク質）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0B1D35;--blue:#1E6FD9;--sky:#5DADE2;--mint:#06C755;
  --pale:#EBF3FF;--text:#0F2137;--sub:#5A6F84;--muted:#8FA3B8;
  --border:#D8E5EF;--bg:#F4F8FC;--white:#fff;
  --ok:#27AE60;--warn:#E8A030;--danger:#E53E3E;
  --ok-bg:#EAFAF1;--warn-bg:#FFF7E6;--danger-bg:#FFF5F5;
  --line:#06C755;--purple:#6C3483;
  --font:'Plus Jakarta Sans','Noto Sans JP',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r:14px;
}
html,body{height:100%;font-family:var(--font);background:#1A2840;display:flex;align-items:center;justify-content:center;overflow:hidden}
.phone{width:390px;height:844px;background:var(--white);border-radius:44px;box-shadow:0 0 0 10px #141F30,0 0 0 12px #0D1520,0 32px 80px rgba(0,0,0,.7);overflow:hidden;display:flex;flex-direction:column;position:relative}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:34px;background:#141F30;border-radius:0 0 22px 22px;z-index:20}
.sb{height:34px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;padding-top:6px;font-size:10px;color:rgba(255,255,255,.6);font-family:var(--mono);flex-shrink:0}
.sb-light{background:var(--navy)}
.screen{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}

.scroll-white{flex:1;overflow-y:auto;padding:18px 18px 24px;background:var(--white)}
.scroll-white::-webkit-scrollbar{display:none}

.field{margin-bottom:13px}
.f-lbl{display:block;font-size:11px;font-weight:600;color:var(--text);margin-bottom:5px}
.f-req{color:var(--danger)}

.step-wrap{padding:14px 18px 18px;flex-shrink:0;background:linear-gradient(160deg,var(--navy) 0%,#1A4F8A 100%);position:relative;overflow:hidden}
.step-wrap::after{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.04);bottom:-80px;right:-50px}
.step-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:8px}
.step-title{font-size:14px;font-weight:700;color:white}
.prog{height:3px;background:rgba(255,255,255,.15);border-radius:99px;margin-bottom:12px}
.prog-fill{height:100%;border-radius:99px;background:#06C755;transition:width .4s}
.steps{display:flex;align-items:center;position:relative;z-index:1}
.s-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.s-done{background:#06C755;color:var(--navy)}
.s-act{background:white;color:var(--navy);box-shadow:0 0 0 3px rgba(255,255,255,.25)}
.s-todo{background:rgba(255,255,255,.15);color:rgba(255,255,255,.4)}
.s-lbl{font-size:8px;color:rgba(255,255,255,.5);margin-top:3px;white-space:nowrap}
.s-line{flex:1;height:2px;margin:0 2px;margin-bottom:14px}
.s-line-done{background:#06C755}
.s-line-todo{background:rgba(255,255,255,.15)}

.btn{width:100%;height:50px;border-radius:var(--r);border:none;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;transition:all .18s;letter-spacing:-.01em}
.btn-blue{background:linear-gradient(135deg,#1E6FD9,#0B4DB5);color:white;box-shadow:0 4px 16px rgba(30,111,217,.3)}
.btn-ghost{background:white;color:var(--blue);border:1.5px solid var(--border)}

/* タンパク質サマリーカード */
.protein-need-card{
  background:linear-gradient(135deg,#FFFDF5,#FFF7E6);
  border:1.5px solid rgba(232,160,48,.3);
  border-radius:var(--r);padding:14px;margin-bottom:14px;
}
.pn-row{display:flex;align-items:center;gap:13px}
.pn-ico{
  width:48px;height:48px;border-radius:13px;
  background:linear-gradient(135deg,#E8A030,#C47010);color:white;
  display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;
  box-shadow:0 4px 14px rgba(232,160,48,.35);
}
.pn-body{flex:1;min-width:0}
.pn-lbl{font-size:10px;color:var(--sub);font-weight:600;margin-bottom:3px}
.pn-val{display:flex;align-items:baseline;gap:5px}
.pn-val .v{font-family:var(--mono);font-size:24px;font-weight:800;color:#8A4F00;line-height:1}
.pn-val .u{font-size:12px;color:#8A4F00;font-weight:700}
.pn-formula{font-size:10px;color:var(--sub);margin-top:3px}

/* プロテインカード */
.prot-card{
  background:linear-gradient(135deg,#EBF3FF,#E8FAF0);
  border:1.5px solid rgba(30,111,217,.2);
  border-radius:var(--r);padding:14px;margin-bottom:14px;
}
.prot-hdr{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.prot-ico{
  width:40px;height:40px;border-radius:11px;
  background:linear-gradient(135deg,#1E6FD9,#06C755);color:white;
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.prot-ttl{font-size:13px;font-weight:700;color:var(--navy)}
.prot-sub{font-size:10px;color:var(--sub);margin-top:1px}

.num-wrap{display:flex;align-items:stretch;border:1.5px solid var(--border);border-radius:11px;overflow:hidden;height:46px;background:#FAFCFE;margin-bottom:10px}
.nm-btn{width:46px;background:var(--pale);border:none;font-size:20px;font-weight:300;color:var(--blue);cursor:pointer;padding:0;font-family:var(--font);user-select:none}
.nm-btn:hover{background:#D8E8F8}
.nm-btn:active{background:#C5D9EA}
.nm-c{flex:1;display:flex;align-items:center;justify-content:center;gap:5px}
.nm-v{text-align:center;font-family:var(--mono);font-size:20px;font-weight:600;color:var(--navy);border:none;background:transparent;outline:none;width:64px}
.nm-u{font-size:12px;color:var(--sub)}

/* チップ */
.chip-row{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.chip{flex:1;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid;min-width:0;padding:0 6px}
.chip-sel{background:var(--pale);border-color:var(--blue);color:var(--blue)}
.chip-idle{background:#FAFCFE;border-color:var(--border);color:var(--sub)}

/* 食事3食 */
.meal-section{margin-top:6px}
.meal-row{display:flex;flex-direction:column;gap:9px;margin-bottom:10px}
.meal-card{
  border-radius:11px;border:1.5px solid var(--border);
  background:#FAFCFE;padding:11px 12px;
  display:flex;align-items:center;gap:11px;
}
.meal-ico{
  width:36px;height:36px;border-radius:10px;
  background:#F2F4F6;display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.meal-info{flex:1;min-width:0}
.meal-name{font-size:12px;font-weight:700;color:var(--text)}
.meal-time-lbl{font-size:9px;color:var(--muted);margin-top:1px}
.meal-choices{
  display:grid;grid-template-columns:repeat(3,1fr);gap:5px;width:170px;
}
.meal-choice{
  height:28px;border-radius:6px;border:1px solid var(--border);
  background:white;font-size:9px;font-weight:600;cursor:pointer;
  color:var(--sub);transition:all .15s;font-family:var(--font);
  display:flex;align-items:center;justify-content:center;line-height:1;padding:0 2px;
  white-space:nowrap;
}
.meal-choice:hover{border-color:#BFCFDE}
.meal-choice.sel-short{background:var(--danger-bg);border-color:var(--danger);color:var(--danger);font-weight:700}
.meal-choice.sel-ok{background:var(--ok-bg);border-color:var(--ok);color:var(--ok);font-weight:700}
.meal-choice.sel-over{background:var(--warn-bg);border-color:var(--warn);color:var(--warn);font-weight:700}

/* タンパク質摂取量サマリー */
.intake-summary{
  display:flex;align-items:center;gap:11px;
  padding:11px 13px;border-radius:11px;border:1.5px solid;
  font-size:12px;font-weight:600;margin-bottom:14px;
}
.is-ico{font-size:18px;line-height:1;flex-shrink:0}
.is-txt{flex:1;line-height:1.4}
.is-cnt{
  font-family:var(--mono);font-size:11px;font-weight:700;
  padding:3px 8px;border-radius:99px;background:white;flex-shrink:0;
}
.is-ok{background:var(--ok-bg);border-color:#A9DFBF;color:#1A6B3A}
.is-warn{background:var(--warn-bg);border-color:#F8C471;color:#8A4F00}
.is-bad{background:var(--danger-bg);border-color:#F9BABA;color:#9B1A1A}

/* セクション見出し */
.sec-lbl{font-size:12px;font-weight:700;color:var(--blue);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.sec-lbl-dot{width:7px;height:7px;border-radius:50%;background:var(--blue)}

#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--navy);color:white;font-size:12px;font-weight:600;padding:11px 20px;border-radius:99px;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;box-shadow:0 8px 24px rgba(11,29,53,.25);pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══ iPhone等の実機モバイル対応 ══ */
@media (max-width: 480px), (max-height: 900px) {
  html, body { height:100%; background:var(--bg) !important; display:block !important; overflow:hidden; }
  .phone { width:100% !important; height:100% !important; border-radius:0 !important; box-shadow:none !important; max-width:none !important; }
  .notch { display:none !important; }
  .sb { display:none !important; }
  .bnav { padding-bottom: calc(9px + env(safe-area-inset-bottom)) !important; }
}
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="screen">
    <div class="sb sb-light"><span>9:42</span><span>● ● 100%</span></div>
    <div class="step-wrap">
      <div class="step-top"><div class="step-title">食事（タンパク質）</div><div style="background:rgba(255,255,255,.1);border-radius:99px;padding:3px 11px;font-size:10px;color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.15)">📅 毎日 / 約2分</div></div>
      <div class="prog"><div class="prog-fill" style="width:50%"></div></div>
      <div class="steps">
        <div style="display:flex;flex-direction:column;align-items:center"><div class="s-dot s-done">✓</div><div class="s-lbl">身体測定</div></div>
        <div class="s-line s-line-done"></div>
        <div style="display:flex;flex-direction:column;align-items:center"><div class="s-dot s-act">2</div><div class="s-lbl">食事</div></div>
        <div class="s-line s-line-todo"></div>
        <div style="display:flex;flex-direction:column;align-items:center"><div class="s-dot s-todo">3</div><div class="s-lbl">生活習慣</div></div>
        <div class="s-line s-line-todo"></div>
        <div style="display:flex;flex-direction:column;align-items:center"><div class="s-dot s-todo">4</div><div class="s-lbl">確認</div></div>
      </div>
    </div>
    <div class="scroll-white">

      <!-- あなたの必要なタンパク質摂取量 -->
      <div class="protein-need-card">
        <div class="pn-row">
          <div class="pn-ico">🥩</div>
          <div class="pn-body">
            <div class="pn-lbl">あなたの必要なタンパク質摂取量（1日）</div>
            <div class="pn-val">
              <span class="v" id="need-protein-val">104.6</span>
              <span class="u">g / 日</span>
            </div>
            <div class="pn-formula">体重 <span id="weight-display">52.3</span>kg × 2 = 必要量</div>
          </div>
        </div>
      </div>

      <!-- プロテイン入力 -->
      <div class="sec-lbl"><div class="sec-lbl-dot"></div>プロテインの入力</div>

      <div class="prot-card">
        <div class="prot-hdr">
          <div class="prot-ico">💊</div>
          <div style="flex:1">
            <div class="prot-ttl">今日のプロテイン</div>
            <div class="prot-sub">使用量・タイミング・頻度を記録</div>
          </div>
        </div>

        <label class="f-lbl">今日プロテインで摂取したタンパク質量 <span class="f-req">*</span><span style="font-size:10px;color:var(--sub);font-weight:400;margin-left:6px">前回値が初期入力されます</span></label>
        <div class="num-wrap">
          <button type="button" class="nm-btn" onclick="adj('pg',-1)">−</button>
          <div class="nm-c"><input class="nm-v" id="pg" value="20"><span class="nm-u">g</span></div>
          <button type="button" class="nm-btn" onclick="adj('pg',1)">＋</button>
        </div>

        <label class="f-lbl" style="margin-bottom:7px">服用タイミング</label>
        <div class="chip-row">
          <div class="chip chip-sel"  id="chip-pre-post" onclick="toggleChip('pre-post')">練習前後</div>
          <div class="chip chip-idle" id="chip-before"   onclick="toggleChip('before')">就寝前</div>
          <div class="chip chip-idle" id="chip-morning"  onclick="toggleChip('morning')">朝食時</div>
        </div>

        <label class="f-lbl" style="margin-bottom:7px;margin-top:6px">服用頻度</label>
        <div class="chip-row">
          <div class="chip chip-sel"  id="freq-daily" onclick="setFreq('daily')">毎日</div>
          <div class="chip chip-idle" id="freq-half"  onclick="setFreq('half')">週2〜3日</div>
          <div class="chip chip-idle" id="freq-rare"  onclick="setFreq('rare')">週1日以下</div>
          <div class="chip chip-idle" id="freq-none"  onclick="setFreq('none')">使ってない</div>
        </div>
      </div>

      <!-- 食事入力 -->
      <div class="sec-lbl"><div class="sec-lbl-dot"></div>食事入力</div>

      <div style="font-size:11px;color:var(--sub);margin-bottom:10px;line-height:1.55">
        各食事で<strong>必要なタンパク質（約15g目安）</strong>を摂取できたかを選択してください
      </div>

      <div class="meal-section">
        <div class="meal-row">
          <!-- 朝食 -->
          <div class="meal-card" data-meal="breakfast">
            <div class="meal-ico">🍞</div>
            <div class="meal-info">
              <div class="meal-name">朝食</div>
              <div class="meal-time-lbl">〜10時</div>
            </div>
            <div class="meal-choices">
              <button type="button" class="meal-choice sel-short" data-val="short" onclick="setMealChoice(this,'breakfast','short')">足りない</button>
              <button type="button" class="meal-choice" data-val="ok" onclick="setMealChoice(this,'breakfast','ok')">足りた</button>
              <button type="button" class="meal-choice" data-val="over" onclick="setMealChoice(this,'breakfast','over')">必要以上</button>
            </div>
          </div>

          <!-- 昼食 -->
          <div class="meal-card" data-meal="lunch">
            <div class="meal-ico">🍱</div>
            <div class="meal-info">
              <div class="meal-name">昼食</div>
              <div class="meal-time-lbl">11〜15時</div>
            </div>
            <div class="meal-choices">
              <button type="button" class="meal-choice" data-val="short" onclick="setMealChoice(this,'lunch','short')">足りない</button>
              <button type="button" class="meal-choice sel-ok" data-val="ok" onclick="setMealChoice(this,'lunch','ok')">足りた</button>
              <button type="button" class="meal-choice" data-val="over" onclick="setMealChoice(this,'lunch','over')">必要以上</button>
            </div>
          </div>

          <!-- 夕食 -->
          <div class="meal-card" data-meal="dinner">
            <div class="meal-ico">🍛</div>
            <div class="meal-info">
              <div class="meal-name">夕食</div>
              <div class="meal-time-lbl">17時〜</div>
            </div>
            <div class="meal-choices">
              <button type="button" class="meal-choice" data-val="short" onclick="setMealChoice(this,'dinner','short')">足りない</button>
              <button type="button" class="meal-choice sel-ok" data-val="ok" onclick="setMealChoice(this,'dinner','ok')">足りた</button>
              <button type="button" class="meal-choice" data-val="over" onclick="setMealChoice(this,'dinner','over')">必要以上</button>
            </div>
          </div>
        </div>
      </div>

      <!-- タンパク質摂取サマリー -->
      <div id="intake-summary" class="intake-summary is-warn">
        <span class="is-ico" id="is-ico">⚠</span>
        <span class="is-txt" id="is-txt">朝食のタンパク質が不足しています</span>
        <span class="is-cnt" id="is-cnt">推定 約50g</span>
      </div>

      <button class="btn btn-blue" onclick="saveCurrent();window.location.href='D-06_input_step3.html'">次へ → 生活習慣の入力</button>
      <button class="btn btn-ghost" onclick="location.href='D-04_input_step1.html'">← 戻る</button>
      <div style="text-align:center;font-size:11px;color:var(--danger);cursor:pointer;margin-top:4px" onclick="cancelInput()">✕ 入力を中止する</div>

    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════
// 必要タンパク質量の計算（体重 × 2）
// ══════════════════════════════════════════════════
function recalcProteinNeed(){
  var w = 52.3;
  try{
    var s = JSON.parse(localStorage.getItem('nobita_input') || '{}');
    if(s.wt !== undefined) w = parseFloat(s.wt);
  }catch(e){}
  var need = Math.round(w * 2 * 10) / 10;
  var nv = document.getElementById('need-protein-val');
  var wd = document.getElementById('weight-display');
  if(nv) nv.textContent = need.toFixed(1);
  if(wd) wd.textContent = w.toFixed(1);
  return need;
}

// ══════════════════════════════════════════════════
// 数値入力（+/-）
// ══════════════════════════════════════════════════
var _numCfg = {
  pg: { step:1, min:0, max:200, dec:0 }
};
function adj(id, delta){
  var inp = document.getElementById(id);
  if(!inp) return;
  var c = _numCfg[id];
  var v = parseInt(inp.value, 10);
  if(isNaN(v)) v = 0;
  v = Math.max(c.min, Math.min(c.max, v + delta));
  inp.value = String(v);
  _renderIntakeSummary();
}

// ══════════════════════════════════════════════════
// プロテイン服用タイミング（複数選択）
// ══════════════════════════════════════════════════
var _CHIPS = { 'pre-post':'練習前後', 'before':'就寝前', 'morning':'朝食時' };
var _selectedChips = new Set(['pre-post']);
function toggleChip(key){
  var el = document.getElementById('chip-' + key);
  if(!el) return;
  if(_selectedChips.has(key)){
    _selectedChips.delete(key);
    el.classList.remove('chip-sel'); el.classList.add('chip-idle');
    el.textContent = _CHIPS[key];
  } else {
    _selectedChips.add(key);
    el.classList.add('chip-sel'); el.classList.remove('chip-idle');
    el.textContent = _CHIPS[key] + ' ✓';
  }
}

// ══════════════════════════════════════════════════
// プロテイン服用頻度（単一選択）
// ══════════════════════════════════════════════════
var _freq = 'daily';
function setFreq(key){
  ['daily','half','rare','none'].forEach(function(k){
    var el = document.getElementById('freq-' + k);
    if(!el) return;
    if(k === key){ el.classList.add('chip-sel'); el.classList.remove('chip-idle'); }
    else { el.classList.remove('chip-sel'); el.classList.add('chip-idle'); }
  });
  _freq = key;
}

// ══════════════════════════════════════════════════
// 食事3択（足りない/足りた/必要以上）
// ══════════════════════════════════════════════════
var _mealChoices = { breakfast:'short', lunch:'ok', dinner:'ok' };
function setMealChoice(btn, meal, val){
  var card = btn.closest('.meal-card');
  if(!card) return;
  card.querySelectorAll('.meal-choice').forEach(function(b){
    b.classList.remove('sel-short','sel-ok','sel-over');
  });
  btn.classList.add('sel-' + val);
  _mealChoices[meal] = val;
  _renderIntakeSummary();
}

// ══════════════════════════════════════════════════
// タンパク質摂取量サマリー
// ══════════════════════════════════════════════════
function _renderIntakeSummary(){
  var need = recalcProteinNeed();
  // 各食事の推定タンパク質量
  // short=8g, ok=15g, over=22g
  var perMeal = { short:8, ok:15, over:22 };
  var fromMeals = (perMeal[_mealChoices.breakfast] || 0)
                + (perMeal[_mealChoices.lunch] || 0)
                + (perMeal[_mealChoices.dinner] || 0);
  var fromProtein = parseFloat((document.getElementById('pg') || {}).value || '0');
  var total = fromMeals + fromProtein;

  var box = document.getElementById('intake-summary');
  var ico = document.getElementById('is-ico');
  var txt = document.getElementById('is-txt');
  var cnt = document.getElementById('is-cnt');
  if(!box || !ico || !txt || !cnt) return;

  box.classList.remove('is-ok','is-warn','is-bad');
  cnt.textContent = '推定 約' + Math.round(total) + 'g / ' + Math.round(need) + 'g';

  var ratio = need > 0 ? total / need : 0;
  if(ratio >= 1){
    box.classList.add('is-ok');
    ico.textContent = '🌟';
    txt.textContent = '必要量を達成しています！';
  } else if(ratio >= 0.7){
    box.classList.add('is-warn');
    ico.textContent = '⚠';
    var missingMeals = [];
    if(_mealChoices.breakfast === 'short') missingMeals.push('朝食');
    if(_mealChoices.lunch === 'short') missingMeals.push('昼食');
    if(_mealChoices.dinner === 'short') missingMeals.push('夕食');
    if(missingMeals.length){
      txt.textContent = missingMeals.join('・') + 'のタンパク質が不足しています';
    } else {
      txt.textContent = 'もう少し摂取しましょう';
    }
  } else {
    box.classList.add('is-bad');
    ico.textContent = '⚠';
    txt.textContent = 'タンパク質が大きく不足しています';
  }
}

// ══════════════════════════════════════════════════
// 保存・復元
// ══════════════════════════════════════════════════
var _STORE = 'nobita_input';
function loadPrev(){
  try{
    var saved = JSON.parse(localStorage.getItem(_STORE) || '{}');
    // pg（プロテイン量）の前回値復元
    if(saved.pg !== undefined){
      var pg = document.getElementById('pg');
      if(pg) pg.value = saved.pg;
    }
    // 服用タイミング
    if(saved.timing){
      var chips = saved.timing.split(',').filter(Boolean);
      _selectedChips = new Set();
      ['pre-post','before','morning'].forEach(function(k){
        var el = document.getElementById('chip-' + k);
        if(!el) return;
        el.classList.remove('chip-sel'); el.classList.add('chip-idle');
        el.textContent = _CHIPS[k];
      });
      chips.forEach(function(k){
        if(_CHIPS[k]) toggleChip(k);
      });
    }
    // 服用頻度
    if(saved.freq) setFreq(saved.freq);
    // 食事の前回値
    if(saved.meal_choices){
      try{
        var mc = JSON.parse(saved.meal_choices);
        ['breakfast','lunch','dinner'].forEach(function(meal){
          if(mc[meal]){
            _mealChoices[meal] = mc[meal];
            document.querySelectorAll('.meal-card[data-meal="' + meal + '"] .meal-choice').forEach(function(b){
              b.classList.remove('sel-short','sel-ok','sel-over');
              if(b.dataset.val === mc[meal]) b.classList.add('sel-' + mc[meal]);
            });
          }
        });
      }catch(e){}
    }
  }catch(e){}
  _renderIntakeSummary();
}

function saveCurrent(){
  try{
    var existing = JSON.parse(localStorage.getItem(_STORE) || '{}');
    var pg = document.getElementById('pg');
    if(pg) existing.pg = pg.value;
    existing.timing = Array.from(_selectedChips).join(',');
    existing.freq = _freq;
    existing.meal_choices = JSON.stringify(_mealChoices);
    localStorage.setItem(_STORE, JSON.stringify(existing));
  }catch(e){}
}

function cancelInput(){
  if(confirm('入力を中止してホーム画面に戻りますか？\n入力中のデータは保存されません。')){
    window.location.href = 'D-01_dashboard.html';
  }
}

function toast(msg){
  var t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove('show'); }, 2600);
}

window.addEventListener('load', loadPrev);
</script>
