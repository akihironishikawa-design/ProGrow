<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProGrow — リダイレクト中</title>
<meta http-equiv="refresh" content="0; url=../index.html">
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif;background:#0B1D35;color:white;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
.box{max-width:420px;padding:30px}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:white;border-radius:50%;margin:0 auto 18px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
h1{font-size:18px;margin:0 0 10px;font-weight:700}
p{font-size:13px;color:rgba(255,255,255,.65);margin:0;line-height:1.6}
a{color:#5DADE2;text-decoration:underline;font-size:12px}
</style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h1>管理コンソールは統合されました</h1>
    <p>共通ログイン画面から <strong>@progrow.app</strong> の Googleアカウントでログインしてください。</p>
    <p style="margin-top:16px"><a href="../index.html">→ ログイン画面へ移動</a></p>
  </div>
  <script>setTimeout(function(){ window.location.href='../index.html'; }, 400);</script>
</body>
</html>
